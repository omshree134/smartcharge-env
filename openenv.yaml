name: smartcharge-env
description: EV charging optimization environment with deadline, price, and renewable-aware scheduling.

tasks:
  - id: easy
    name: Commuter Morning Rush
    difficulty: easy
    objective: Serve at least 3 vehicles with at most 1 miss.
  - id: medium
    name: Dynamic Pricing Shift
    difficulty: medium
    objective: Serve at least 4 vehicles while limiting dirty expensive charging.
  - id: hard
    name: Storm Response Recovery
    difficulty: hard
    objective: Serve at least 6 vehicles with at most 1 miss during burst arrivals.

entry_point: inference.py
